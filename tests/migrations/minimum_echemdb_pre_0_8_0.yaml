# Fixture: minimum_echemdb metadata in the PRE-0.8.0 layout, i.e. with
# `temperature` still under `system.electrolyte`. It fails validation against
# the current schema and must validate after the 0.8.0 migration moves the
# temperature to `experimental.operationParameters.temperature`.
echemdbSchemaVersion: 0.7.1
curation:
  process:
    - role: curator
      name: Albert Engstfeld
      orcid: https://orcid.org/0000-0002-9686-3948
system:
  type: electrochemical
  electrolyte:
    type: aqueous
    components:
      - name: NaCl
        concentration:
          value: 0.1
          unit: mol / l
        type: salt
      - name: water
        type: solvent
        proportion:
          value: 100
          unit: volume percent
    ph:
      value: 13
      uncertainty:
        value: 0.1
    temperature: # old location, moved by the 0.8.0 migration
      value: 298.15
      unit: K
  electrodes:
    - name: RE
      function: reference electrode
      redoxSystem: RHE
      material: Pt
      type: wire
    - name: WE
      function: working electrode
      type: single crystal
      material: Ni
      crystallographicOrientation: "111"
      geometricElectrolyteContactArea:
        value: 1
        unit: cm-2
  electrochemicalCell:
    type: flow cell attached to UHV system
    source:
      url: https://doi.org/10.1002/chem.201803418
source:
  citationKey: engstfeld_2018_polycrystalline_17743
  url: https://doi.org/10.1002/chem.201803418
  figure: 4b
  curve: blue
  techniques:
    - XPS
    - STM
experimental:
  tags:
    - BCV
    - ORR
figureDescription:
  type: raw
  measurementType: CV
  comment: Comment about the data.
  scanRate:
    value: 50
    unit: mV / s
